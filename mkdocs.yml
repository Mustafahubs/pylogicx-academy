    - Week 9 — Email Automation: quizzes/week09_quiz.md
    - Week 10 — Automation Pipelines: quizzes/week10_quiz.md
  - Month 3 Quizzes:
    - Week 11 — Object-Oriented Programming: quizzes/week11_quiz.md
